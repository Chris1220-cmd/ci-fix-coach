name: 'CI Fix Coach'
description: 'AI-powered CI failure diagnosis — get actionable fix suggestions on your PRs'
author: 'CI Fix Coach'
branding:
  icon: 'tool'
  color: 'orange'

inputs:
  anthropic-api-key:
    description: 'Anthropic API key for Claude'
    required: true
  github-token:
    description: 'GitHub token for API access (defaults to GITHUB_TOKEN)'
    required: false
    default: ${{ github.token }}
  model:
    description: 'Claude model to use'
    required: false
    default: 'claude-haiku-4-5-20251001'
  log-lines:
    description: 'Max number of log lines to analyze per job'
    required: false
    default: '120'
  wait-seconds:
    description: 'Seconds to wait for other checks to complete'
    required: false
    default: '15'

runs:
  using: 'node20'
  main: 'src/index.js'
