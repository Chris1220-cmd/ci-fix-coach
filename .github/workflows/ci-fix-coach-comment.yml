name: CI Fix Coach - PR comment

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  checks: read
  actions: read
  issues: write
  pull-requests: write

jobs:
  comment:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Read system prompt
        id: prompt
        run: |
          PROMPT=$(cat ci-fix-coach-system-prompt.txt)
          echo "system_prompt<<PROMPT_EOF" >> "$GITHUB_OUTPUT"
          echo "$PROMPT" >> "$GITHUB_OUTPUT"
          echo "PROMPT_EOF" >> "$GITHUB_OUTPUT"

      - name: Get failed checks and call Claude
        uses: actions/github-script@v7
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SYSTEM_PROMPT: ${{ steps.prompt.outputs.system_prompt }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            // Wait for other checks to finish
            await new Promise(r => setTimeout(r, 15000));

            // Get all checks for this PR
            const checks = await github.rest.checks.listForRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.payload.pull_request.head.sha
            });

            // Find only the failed ones
            const failed = checks.data.check_runs.filter(
              c => c.conclusion === 'failure'
            );

            if (failed.length === 0) {
              console.log('No failed checks, skipping.');
              return;
            }

            const failedNames = failed.map(c => c.name).join(', ');
            console.log('Failed jobs:', failedNames);

            // Get workflow runs for this commit to download real logs
            const runs = await github.rest.actions.listWorkflowRunsForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head_sha: context.payload.pull_request.head.sha
            });

            let logSnippets = '';

            for (const run of runs.data.workflow_runs) {
              if (run.conclusion !== 'failure') continue;

              // Get jobs for this run
              const jobs = await github.rest.actions.listJobsForWorkflowRun({
                owner: context.repo.owner,
                repo: context.repo.repo,
                run_id: run.id
              });

              for (const job of jobs.data.jobs) {
                if (job.conclusion !== 'failure') continue;

                let snippet = '--- Job: ' + job.name + ' ---\n';

                try {
                  // Download the actual job log
                  const logResponse = await github.rest.actions.downloadJobLogsForWorkflowRun({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    job_id: job.id
                  });

                  // logResponse.data is the raw log text
                  const fullLog = typeof logResponse.data === 'string'
                    ? logResponse.data
                    : String(logResponse.data);

                  // Get last 80 lines (where the error usually is)
                  const lines = fullLog.split('\n');
                  const last80 = lines.slice(-80).join('\n');
                  snippet += last80 + '\n';
                } catch (e) {
                  snippet += 'Could not download logs: ' + e.message + '\n';
                  // Fallback: use failed steps info
                  for (const step of job.steps || []) {
                    if (step.conclusion === 'failure') {
                      snippet += 'Failed step: ' + step.name + '\n';
                    }
                  }
                }

                logSnippets += snippet + '\n';
              }
            }

            console.log('Log snippets length:', logSnippets.length);

            // If no logs found, use check names as fallback
            if (!logSnippets.trim()) {
              logSnippets = 'Failed checks: ' + failedNames + '\nNo detailed logs available.\n';
            }

            // Build user message with actual log content
            const userMessage = [
              'Failed CI jobs: ' + failedNames,
              '',
              'Here are the error logs:',
              logSnippets,
              '',
              'Analyze these failures. Reply ONLY in A/B/C/D/E format.',
              'IMPORTANT: Section C MUST use numbered steps: 1) ... 2) ... 3) ...',
              'Start your reply with A. on the first line. No other text.'
            ].join('\n');

            // Call Claude API with system prompt from file
            const response = await fetch('https://api.anthropic.com/v1/messages', {
              method: 'POST',
              headers: {
                'x-api-key': process.env.ANTHROPIC_API_KEY,
                'anthropic-version': '2023-06-01',
                'content-type': 'application/json'
              },
              body: JSON.stringify({
                model: 'claude-haiku-4-5-20251001',
                max_tokens: 1024,
                system: process.env.SYSTEM_PROMPT,
                messages: [
                  {
                    role: 'user',
                    content: userMessage
                  }
                ]
              })
            });

            const data = await response.json();

            if (!data.content || !data.content[0]) {
              console.log('Unexpected API response:', JSON.stringify(data));
              return;
            }

            const reply = data.content[0].text;

            // Post comment on the PR
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: '## CI Fix Coach\n\n' + reply
            });
