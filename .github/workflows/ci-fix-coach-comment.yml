name: CI Fix Coach - PR comment

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  checks: read
  issues: write
  pull-requests: write

jobs:
  comment:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Read system prompt
        id: prompt
        run: |
          PROMPT=$(cat ci-fix-coach-system-prompt.txt)
          echo "system_prompt<<PROMPT_EOF" >> "$GITHUB_OUTPUT"
          echo "$PROMPT" >> "$GITHUB_OUTPUT"
          echo "PROMPT_EOF" >> "$GITHUB_OUTPUT"

      - name: Get failed checks and call Claude
        uses: actions/github-script@v7
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SYSTEM_PROMPT: ${{ steps.prompt.outputs.system_prompt }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            // Wait for other checks to finish
            await new Promise(r => setTimeout(r, 15000));

            // Get all checks for this PR
            const checks = await github.rest.checks.listForRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.payload.pull_request.head.sha
            });

            // Find only the failed ones
            const failed = checks.data.check_runs.filter(
              c => c.conclusion === 'failure'
            );

            if (failed.length === 0) {
              console.log('No failed checks, skipping.');
              return;
            }

            const failedNames = failed.map(c => c.name).join(', ');
            console.log('Failed jobs:', failedNames);

            // Fetch actual logs from failed workflow runs
            let logSnippets = '';
            for (const check of failed) {
              // Get annotations (error messages) from the check run
              const annotations = await github.rest.checks.listAnnotations({
                owner: context.repo.owner,
                repo: context.repo.repo,
                check_run_id: check.id
              });

              let snippet = '--- Job: ' + check.name + ' ---\n';

              // Add check run output if available
              if (check.output && check.output.summary) {
                snippet += check.output.summary + '\n';
              }

              // Add annotations (these contain the actual error messages)
              if (annotations.data.length > 0) {
                for (const ann of annotations.data) {
                  snippet += ann.annotation_level + ': ' + ann.message + '\n';
                  if (ann.path) snippet += 'File: ' + ann.path + ':' + ann.start_line + '\n';
                }
              }

              // If no annotations, try to get logs from the workflow run
              if (annotations.data.length === 0 && !check.output?.summary) {
                snippet += 'conclusion: ' + check.conclusion + '\n';
                snippet += 'No detailed log available from checks API.\n';
                snippet += 'Job name: ' + check.name + '\n';
                if (check.output && check.output.text) {
                  snippet += check.output.text.substring(0, 2000) + '\n';
                }
              }

              logSnippets += snippet + '\n';
            }

            console.log('Log snippets:', logSnippets);

            // Build user message with actual log content
            const userMessage = [
              'Failed CI jobs: ' + failedNames,
              '',
              'Here are the error logs:',
              logSnippets,
              '',
              'Analyze these failures and give me your diagnosis in format A/B/C/D/E.',
              'Keep it simple and practical.'
            ].join('\n');

            // Call Claude API with system prompt from file
            const response = await fetch('https://api.anthropic.com/v1/messages', {
              method: 'POST',
              headers: {
                'x-api-key': process.env.ANTHROPIC_API_KEY,
                'anthropic-version': '2023-06-01',
                'content-type': 'application/json'
              },
              body: JSON.stringify({
                model: 'claude-haiku-4-5-20251001',
                max_tokens: 1024,
                system: process.env.SYSTEM_PROMPT,
                messages: [
                  {
                    role: 'user',
                    content: userMessage
                  }
                ]
              })
            });

            const data = await response.json();

            if (!data.content || !data.content[0]) {
              console.log('Unexpected API response:', JSON.stringify(data));
              return;
            }

            const reply = data.content[0].text;

            // Post comment on the PR
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: '## CI Fix Coach\n\n' + reply
            });
