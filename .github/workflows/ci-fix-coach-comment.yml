name: CI Fix Coach - PR comment

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  checks: read
  issues: write
  pull-requests: write

jobs:
  comment:
    runs-on: ubuntu-latest
    steps:
      - name: Get CI logs and call Claude
        uses: actions/github-script@v7
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await new Promise(r => setTimeout(r, 15000));
            const checks = await github.rest.checks.listForRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.payload.pull_request.head.sha
            });
            const failed = checks.data.check_runs.filter(
              c => c.conclusion === 'failure'
            );
            if (failed.length === 0) {
              console.log('No failed checks, skipping.');
              return;
            }
            const failedNames = failed.map(c => c.name).join(', ');
            const prompt = `Είσαι ένας agent με όνομα CI Fix Coach.

Ρόλος:
- Διαβάζεις αποτυχίες από CI logs και τις μετατρέπεις σε απλή διάγνωση και πρακτικά βήματα.
- Μιλάς πάντα στα ελληνικά, με μικρές, καθαρές προτάσεις, σαν να εξηγείς σε junior developer.

Output:
Πάντα απαντάς ΜΟΝΟ στο παρακάτω format:

Α. <μία σύντομη πρόταση που εξηγεί τι απέτυχε>
Β. <μία σύντομη πρόταση που εξηγεί γιατί απέτυχε>
Γ. Τι κάνεις τώρα:
1) <βήμα 1>
2) <βήμα 2>
3) <βήμα 3>
Δ. Τοπικός έλεγχος:
<εντολή>
Ε. Αρχείο/αλλαγή:
<όνομα αρχείου – σύντομη περιγραφή>

Κανόνες:
- Ξεκινάς ΠΑΝΤΑ με Α.
- Δεν βάζεις χαιρετισμούς, εισαγωγές ή συμπεράσματα.
- Δεν προσθέτεις καμία άλλη ενότητα εκτός από Α Β Γ Δ Ε.
- Στη Γ. γράφεις πάντα αριθμημένη λίστα.

CI Pipeline που απέτυχε:
Failed jobs: ${failedNames}

Αν δεν έχεις αρκετές πληροφορίες από το όνομα του job, ζήτα τα logs με τη φράση: "Στείλε τις 20 γραμμές πιο πάνω από το πρώτο ERROR και τις 20 πιο κάτω".`;

            const response = await fetch('https://api.anthropic.com/v1/messages', {
              method: 'POST',
              headers: {
                'x-api-key': process.env.ANTHROPIC_API_KEY,
                'anthropic-version': '2023-06-01',
                'content-type': 'application/json'
              },
              body: JSON.stringify({
                model: 'claude-haiku-4-5',
                max_tokens: 1024,
                messages: [{ role: 'user', content: prompt }]
              })
            });
            const data = await response.json();
            const reply = data.content[0].text;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: '## CI Fix Coach\n\n' + reply
            });
