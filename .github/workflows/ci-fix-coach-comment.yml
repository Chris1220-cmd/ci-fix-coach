name: CI Fix Coach - PR comment

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  checks: read
  issues: write
  pull-requests: write

jobs:
  comment:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get CI logs and call Claude
        uses: actions/github-script@v7
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await new Promise(r => setTimeout(r, 15000));

            const checks = await github.rest.checks.listForRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.payload.pull_request.head.sha
            });

            const failed = checks.data.check_runs.filter(
              c => c.conclusion === 'failure'
            );

            if (failed.length === 0) {
              console.log('No failed checks, skipping.');
              return;
            }

            const failedNames = failed.map(c => c.name).join(', ');

            const prompt = `You are CI Fix Coach.

Role:
- You read CI failure logs and turn them into a simple diagnosis and practical steps.
- You always speak in simple English, short clear sentences, as if explaining to a junior developer.

Output:
You ALWAYS answer ONLY in this format:

A. <one short sentence that explains what failed>
B. <one short sentence that explains why it failed>
C. What you do now:
1) <step 1>
2) <step 2>
3) <step 3>
D. Local check:
<command>
E. File/change:
<filename – short description>

Rules:
- Always start with A.
- No greetings, no intro, no conclusion.
- Do not add any other sections except A B C D E.
- In section C you always write a numbered list (1, 2, 3).

CI pipeline that failed:
Failed jobs: ${failedNames}

Below you will receive a small snippet from the CI error log.
Use it to give a concrete and practical explanation.`;

            const response = await fetch('https://api.anthropic.com/v1/messages', {
              method: 'POST',
              headers: {
                'x-api-key': process.env.ANTHROPIC_API_KEY,
                'anthropic-version': '2023-06-01',
                'content-type': 'application/json'
              },
              body: JSON.stringify({
                model: 'claude-haiku-4-5',
                max_tokens: 1024,
                system: 'You are CI Fix Coach. Follow strictly the user instructions and format A/B/C/D/E.',
                messages: [
                  {
                    role: 'user',
                    content: prompt
                  }
                ]
              })
            });

            const data = await response.json();
            const reply = data.content[0].text;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: '## CI Fix Coach\n\n' + reply
            });
