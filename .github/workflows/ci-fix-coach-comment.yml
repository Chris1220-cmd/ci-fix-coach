name: CI Fix Coach - PR comment

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  checks: read
  issues: write
  pull-requests: write


jobs:
  comment:
    runs-on: ubuntu-latest
    steps:
      - name: Get CI logs and call Claude
        uses: actions/github-script@v7
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const checks = await github.rest.checks.listForRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.payload.pull_request.head.sha
            });
            const failed = checks.data.check_runs.filter(
              c => c.conclusion === 'failure'
            );
            if (failed.length === 0) {
              console.log('No failed checks, skipping.');
              return;
            }
            const failedNames = failed.map(c => c.name).join(', ');
            const prompt = "You are CI Fix Coach. A CI pipeline failed.\nFailed jobs: "
              + failedNames
              + "\nExplain what broke, why, and how to fix it. Use sections A B C D E.";
            const response = await fetch('https://api.anthropic.com/v1/messages', {
              method: 'POST',
              headers: {
                'x-api-key': process.env.ANTHROPIC_API_KEY,
                'anthropic-version': '2023-06-01',
                'content-type': 'application/json'
              },
              body: JSON.stringify({
                model: 'claude-haiku-4-5',
                max_tokens: 1024,
                messages: [{ role: 'user', content: prompt }]
              })
            });
            const data = await response.json();
            const reply = data.content[0].text;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: '## CI Fix Coach\n\n' + reply
            });
